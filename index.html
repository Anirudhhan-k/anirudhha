<style>
    body{
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, rgb(20, 20, 110), #353636);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    center{
        background: rgb(143, 112, 112);
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        width: 350px;
    }

    h1{
        color: black;
        margin-bottom: 20px;
    }

    input{
        width: 70%;
        padding: 10px;
        border: 2px solid #f8f6f4;
        border-radius: 5px;
        outline: none;
        font-size: 16px;
    }

    button{
        padding: 10px 15px;
        background: #e3e9e3;
        color: rgb(22, 22, 22);
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
        margin-left: 5px;
    }

    button:hover{
        background: #45a049;
    }

    ul{
        list-style: none;
        padding: 0;
        margin-top: 20px;
    }

    li{
        background: #f4f4f4;
        margin: 10px 0;
        padding: 10px;
        border-radius: 5px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    li button{
        background: #ec0707;
        margin-left: 10px;
    }

    li button:hover{
        background: #500303;
    }
</style>
<head>
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<center>
    <h1 class="h1">To-Do List</h1>
    <input id = "input">
    <button onclick = "add()">Add</button>

<ul id = "list-container">
    <li>
        <button onclick = "deleteItem(event)">Delete</button>
    </li>
</ul>
<script>
    var ul = document.getElementById("list-container")
    var input = document.getElementById("input")
    function add()
    {
        var listitem = document.createElement("li")
        listitem.innerHTML = input.value + "<button onclick = 'deleteItem(event)'>Delete</button>"
        ul.append(listitem)
    }
        function deleteItem(event)
        {
            event.target.parentElement.remove()
        }
</script>
</center>
